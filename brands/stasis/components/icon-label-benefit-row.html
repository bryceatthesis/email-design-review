<!--
component: icon-label-benefit-row  [PROPOSED — Bryce design review 2026-06-18; in-review, locks verbatim on first approved-build ship]
PURPOSE: A vertical list of benefit rows; each row pairs a small icon (circular brand icon or checkmark) + a bold uppercase label in a left column with a one-line supporting-copy paragraph in a right column, rows separated by hairline rules (divider-between, none under the last). Built for ~3 rows; duplicate a row to add more. This is the icon+label benefit treatment (vs the text-only checklist-rows), shipped 15× across flows/campaigns (e.g. the [26] Quiz Flow "Proven Ingredients to Upgrade Your Stimulant Experience" section and the GWP intro panel).
SOURCE: PROPOSED 2026-06-17 — built to brands/stasis/tokens.json + the Figma mining reference (figma-component-catalog.json module_type "icon-label-benefit-row", frequency 15; per-page descriptions in inventory/figma-modules/26-quiz-flow.json — "Four left-aligned benefit rows: a small colored icon … an uppercase bold label … and a paragraph of supporting copy at right, separated by hairline rules" — and 0124-gwp-flow-mindshift.json). Visual fidelity measured against masters/figma-renders/26-quiz-flow.png (left email, "Proven Ingredients" section): lime lightning / royal up-arrow / royal moon / spice brain icons, ~44%/56% split, black ink label + body. NOT yet extracted from a Bryce-approved build — locks verbatim after it ships in one.
SLOTS (repeat the labeled <tr> block per row; this fragment ships 3):
  {{ROW1_ICON}} / {{ROW2_ICON}} / {{ROW3_ICON}} — small icon image (production-hosted; sourced via email-image-source — canonical masters only, gaps stop the build). Displayed 32x32; supply a square crop (circular icon, checkmark, or flat brand glyph).
  {{ROW1_ICON_ALT}} / {{ROW2_ICON_ALT}} / {{ROW3_ICON_ALT}} — icon alt text.
  {{ROW1_LABEL}} / {{ROW2_LABEL}} / {{ROW3_LABEL}} — bold uppercase label (approved instances: LESS CRASH / BETTER MOOD / BETTER SLEEP). Plain text; wrapping is allowed (the design stacks two-word labels).
  {{ROW1_COPY}} / {{ROW2_COPY}} / {{ROW3_COPY}} — one-line supporting copy paragraph (approved: "L-Theanine provides a steady state of focus and avoid the daily stimulant crash.").
  To change the row count: duplicate a ruled <tr> block and keep the LAST row with border-bottom:none.
REQUIRED MEDIA CLASSES (host must include inside @media only screen and (max-width:480px){...}):
  .px{padding-left:24px !important;padding-right:24px !important;}
  .col-stack{display:block !important;width:100% !important;}
  .ben-left{padding:0 0 10px 0 !important;}
  .ben-label{font-size:24px !important;}
DEPENDENCIES:
  - Light-only pin (§8.6) in host head; Antarctica @font-face kit (host ships it).
  - Icons sourced via email-image-source (canonical masters only); for review they may point at a served-local image.
  - bg white #FFFFFF baked; label + copy ink #0E1A38; hairline rule rgba(14,26,56,0.32) (the divider color used in two-col-list). Label weight 500 (display weight — NOT 900), copy weight 500. Icon color is a property of the supplied image, not a CSS slot.
  - No VML/MSO (no CTA pill in this fragment).
-->
