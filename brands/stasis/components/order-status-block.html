<!--
component: order-status-block  [PROPOSED — Bryce design review 2026-06-18; in-review, locks verbatim on first approved-build ship]
PURPOSE: Transactional order-status header — centered "Thank you for your order." headline, a "Hi {name}," greeting + status body line ("your order is being prepared for shipping…"), and a lime rounded pill showing ORDER CONFIRMATION: {number}. Optional centered order-details block (Order Number / Shipping Address) and an optional TRACK YOUR PACKAGE / TRACK YOUR ORDER CTA pill. This is the "ORDER CONFIRMATION / being prepared for shipping" status block that opens the Order Confirmation and Shipping Notification emails.
SOURCE: PROPOSED 2026-06-17 — built to brands/stasis/tokens.json + the Stasis email-system frames/: "Order Confirmation_Update-1" (idx 34, Client Duplicate (8)), "Order Confirmation_Update" (idx 126, Client Duplicate (3)), "Order Confirmation" (idx 30, photo-hero variant) and "Shipping Notification" (idx 28, order-details + TRACK CTA). Surfaced by the email-system component mining (the order-status pattern recurs across the transactional Order Confirmation / Shipping Notification frames). NOT yet extracted from a Bryce-approved build — locks verbatim after it ships in one.
LAYOUT: This is a <tr><td> ROW fragment for the 600px wrap table. The creme band carries the full status block. The photo-hero overlay variant seen in idx 30 (full-width photo + white STASIS logo + "WE'VE RECEIVED YOUR ORDER" overlay) is NOT part of this fragment — use hero-art-overlay.html above it for that flavor; this block is the text-headline + pill body that follows the hero in every variant.
SLOTS:
  {{STATUS_HEADLINE}} — centered headline. Approved frames: "Thank you for your order." (Order Confirmation) / drop this <tr> when a photo-hero overlay already carries "WE'VE RECEIVED YOUR ORDER".
  {{GREETING}} — "Hi Maddie," / "Hi [name]," — leading inline-bold span of the body line.
  {{STATUS_BODY}} — status sentence. Approved: "your order is being prepared for shipping. We'll let you know as soon as it's headed your way." (Order Confirmation) / "your order has shipped!" (Shipping Notification).
  {{ORDER_NUMBER}} — confirmation number shown in the lime pill after "ORDER CONFIRMATION: ". Approved frames show "XXXXXXXXXX" (FPO).
  ---- OPTIONAL order-details block (idx 28 Shipping Notification) — DELETE the whole .order-details <tr> if unused ----
  {{ORDER_NUMBER_DETAIL}} — order number under the "Order Number:" label (centered).
  {{SHIPPING_ADDRESS_HTML}} — inner HTML of the shipping address under "Shipping Address:" (use <br> between lines).
  ---- OPTIONAL track CTA (idx 28 / track-order pill in Welcome idx 125) — DELETE the whole .track-cta <tr> if unused ----
  {{CTA_TEXT}} — CTA label, uppercase. Approved: "TRACK YOUR PACKAGE" / "TRACK YOUR ORDER" (appears TWICE — VML <center> + <a>; both must match).
  {{CTA_HREF}} — CTA destination (appears TWICE — VML href + <a> href; fill both the same).
EMAIL-SAFE INTERPRETATION: the original is a live transactional template — the order number, address, and tracking link are merge fields. Here they are static {{SLOT}} markers the staging step fills from Klaviyo/Shopify event data; the lime pill is a styled bordered box (not a live badge), and the TRACK CTA is the standard §5.1 bulletproof pill (no live tracking widget).
REQUIRED MEDIA CLASSES (host must include inside @media only screen and (max-width:480px){...}):
  .px{padding-left:24px !important;padding-right:24px !important;}
  .h-status{font-size:28px !important;}
  .pill-px{padding-left:18px !important;padding-right:18px !important;}
  .cta-link{white-space:normal !important;}
DEPENDENCIES:
  - Light-only pin (§8.6) in host head; Antarctica @font-face kit from the Stasis Shopify CDN.
  - Sans stack: font-family:'Antarctica','Helvetica Neue',Arial,sans-serif; headline weight 500, body weight 500 with inline 700 greeting, pill label weight 700, detail labels weight 700 / values weight 500, CTA weight 700 letter-spacing 0.18em uppercase.
  - Colors baked from tokens.json: band creme #F4EFEB, headline + body + detail ink #0E1A38, pill fill lime #EEEF78 with pill ink #0E1A38, CTA fill spice #FF541E with label #000000. No dark-mode-only colors.
  - VML/MSO: the TRACK CTA is a §5.1 bulletproof pair — keep the [if mso] v:roundrect AND the [if !mso] table+anchor together (height 56px, width 264px fits a ~16-char label; re-measure the VML width if {{CTA_TEXT}} is materially longer or Outlook clips it).
-->
<tr><td class="px" bgcolor="#F4EFEB" align="center" style="background-color:#F4EFEB;padding:8px 40px 36px 40px;">
  <table role="presentation" width="100%" border="0" cellpadding="0" cellspacing="0" style="width:100%;border-collapse:collapse;"><tbody>
    <tr><td align="center" style="padding:0 0 16px 0;">
      <p class="h-status" style="margin:0;font-family:'Antarctica','Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:34px;line-height:1.06;letter-spacing:-0.03em;color:#0E1A38;text-align:center;">{{STATUS_HEADLINE}}</p>
    </td></tr>
    <tr><td align="center" style="padding:0 0 22px 0;">
      <p style="margin:0 auto;max-width:380px;font-family:'Antarctica','Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:15px;line-height:1.55;letter-spacing:-0.01em;color:#0E1A38;text-align:center;"><strong style="font-weight:700;">{{GREETING}}</strong> {{STATUS_BODY}}</p>
    </td></tr>
    <tr><td align="center" style="padding:0;">
      <table role="presentation" width="100%" border="0" cellpadding="0" cellspacing="0" style="width:100%;background-color:#EEEF78;border-radius:10px;border-collapse:separate;"><tbody><tr>
        <td class="pill-px" align="center" style="padding:16px 28px;font-family:'Antarctica','Helvetica Neue',Arial,sans-serif;font-weight:700;font-size:15px;line-height:1.3;letter-spacing:0.04em;color:#0E1A38;text-align:center;text-transform:uppercase;">ORDER CONFIRMATION: {{ORDER_NUMBER}}</td>
      </tr></tbody></table>
    </td></tr>
    <!-- OPTIONAL order-details block — delete this whole <tr> if unused -->
    <tr class="order-details"><td align="center" style="padding:28px 0 0 0;">
      <table role="presentation" border="0" cellpadding="0" cellspacing="0" style="border-collapse:collapse;"><tbody>
        <tr><td align="center" style="padding:0 0 4px 0;font-family:'Antarctica','Helvetica Neue',Arial,sans-serif;font-weight:700;font-size:14px;line-height:1.3;letter-spacing:-0.01em;color:#0E1A38;text-align:center;">Order Number:</td></tr>
        <tr><td align="center" style="padding:0 0 18px 0;font-family:'Antarctica','Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:14px;line-height:1.4;letter-spacing:-0.01em;color:#0E1A38;text-align:center;">{{ORDER_NUMBER_DETAIL}}</td></tr>
        <tr><td align="center" style="padding:0 0 4px 0;font-family:'Antarctica','Helvetica Neue',Arial,sans-serif;font-weight:700;font-size:14px;line-height:1.3;letter-spacing:-0.01em;color:#0E1A38;text-align:center;">Shipping Address:</td></tr>
        <tr><td align="center" style="padding:0;font-family:'Antarctica','Helvetica Neue',Arial,sans-serif;font-weight:500;font-size:14px;line-height:1.4;letter-spacing:-0.01em;color:#0E1A38;text-align:center;">{{SHIPPING_ADDRESS_HTML}}</td></tr>
      </tbody></table>
    </td></tr>
    <!-- OPTIONAL track CTA — delete this whole <tr> if unused -->
    <tr class="track-cta"><td align="center" style="padding:28px 0 0 0;">
      <!--[if mso]>
      <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="{{CTA_HREF}}" style="height:56px;v-text-anchor:middle;width:264px;" arcsize="50%" stroke="false" fillcolor="#FF541E"><w:anchorlock/>
      <center style="color:#000000;font-family:'Antarctica','Helvetica Neue',Arial,sans-serif;font-size:20px;font-weight:700;letter-spacing:3px;text-transform:uppercase;">{{CTA_TEXT}}</center></v:roundrect>
      <![endif]-->
      <!--[if !mso]><!-->
      <table align="center" role="presentation" border="0" cellpadding="0" cellspacing="0" style="border-collapse:collapse;margin:0 auto;"><tbody><tr><td align="center" bgcolor="#FF541E" style="background-color:#FF541E;border-radius:999px;"><a class="cta-link" href="{{CTA_HREF}}" target="_blank" style="display:inline-block;padding:18px 40px;font-family:'Antarctica','Helvetica Neue',Arial,sans-serif;font-weight:700;font-size:20px;line-height:1;letter-spacing:0.18em;text-transform:uppercase;color:#000000;text-decoration:none;border-radius:999px;white-space:nowrap;">{{CTA_TEXT}}</a></td></tr></tbody></table>
      <!--<![endif]-->
    </td></tr>
  </tbody></table>
</td></tr>
