<!--
component: system-status-cards  [PROPOSED — Bryce design review 2026-06-18; in-review, locks verbatim on first approved-build ship]
PURPOSE: The "Three Systems in Sync" status block — a vertical stack of N (approved instance: 3) full-width rounded status cards, each a distinct soft brand color. Per card: a white status pill at top (a colored check-circle + a system name with its status word, uppercase) and a short body paragraph below. The canonical instance reads "Your Brain at 90 Days: Three Systems in Sync" → CORTISOL: BALANCED (lime) / DOPAMINE: SUPPORTED (periwinkle) / OXIDATIVE STRESS: DEFENDED (mint). Cards stack at all widths; on mobile they go edge-to-edge via .px and the pill rewraps via .stat-pill.
SOURCE: PROPOSED 2026-06-17, built to brands/stasis/tokens.json + the Figma mining reference (module_type "system-status-cards", canonical variant in inventory/figma-modules/26-stasis-flows-live-do-not-edit.json: "Your Brain at 90 Days — Three Systems in Sync" / CORTISOL BALANCED yellow / DOPAMINE SUPPORTED blue-purple / OXIDATIVE STRESS DEFENDED green; mined frequency 6 across 6 pages). Fidelity checked against salvage slices the Stasis email-system reference and your-brain-at-90-days-3-systems-slice.jpeg. NOT yet from a Bryce-approved build — locks verbatim after it ships in one.
SLOTS:
  {{HEADING_LINE1_HTML}} — first heading line, ink (#0E1A38). Approved: Your Brain at 90 Days:
  {{HEADING_LINE2_HTML}} — second heading line, royal (#3D72E6). Approved: Three Systems in Sync
  {{CARD1_BG}} / {{CARD2_BG}} / {{CARD3_BG}} — card fill, one soft color per card (a choice; appears twice per card: bgcolor attr + background-color style — fill both). Approved instance: #EEEF78 (lime) / #C3D4FF (periwinkle) / #BFE9D6 (mint). The check-circle in each pill reuses the same color via its own slot below.
  {{CARD1_CHECK_BG}} / {{CARD2_CHECK_BG}} / {{CARD3_CHECK_BG}} — fill of the check-circle inside each card's pill; set to match the card's {{CARDn_BG}} (kept separate so a build can tint it independently if needed).
  {{CARD1_PILL_HTML}} / {{CARD2_PILL_HTML}} / {{CARD3_PILL_HTML}} — pill label HTML, the system name + status, uppercase ink. Approved: CORTISOL: BALANCED / DOPAMINE: SUPPORTED / OXIDATIVE STRESS: DEFENDED (a trailing claim marker is a copy choice, e.g. <sup style="font-size:11px;line-height:0;">*</sup> with a matching disclaimer module in the host).
  {{CARD1_BODY_HTML}} / {{CARD2_BODY_HTML}} / {{CARD3_BODY_HTML}} — body paragraph HTML beneath each pill, charcoal-on-card ink. Approved card 1: Stimulants push your stress system hard. At 90 days, your body has the nutritional support it needs to find its footing again.
  To change the card count, duplicate one inner card <tr> unit (the table.ssc-card row) and keep the inter-card spacer row pattern (every card except the last is followed by an 18px spacer row).
REQUIRED MEDIA CLASSES (host must include inside @media only screen and (max-width:480px){...}):
  .px{padding-left:24px !important;padding-right:24px !important;}
  .ssc-pad{padding:22px 22px !important;}
  .stat-pill{display:block !important;white-space:normal !important;}
  .ssc-pill-cell{padding:14px 20px !important;}
DEPENDENCIES:
  - Light-only pin (§8.6) in host head; Antarctica @font-face kit (Gmail/Outlook fall back to the tuned sans stack).
  - Sans stack: font-family:'Antarctica','Helvetica Neue',Arial,sans-serif. Heading weight 500 (NOT 900); pill label weight 600; body weight 500.
  - Colors are tokens (tokens.json): heading line 1 + pill labels + body = ink #0E1A38; heading line 2 = royal #3D72E6; pill background = white #FFFFFF; check glyph = ink #0E1A38 on the per-card check-circle fill. Card fills are choices (slots) — approved lime/periwinkle/mint.
  - Card corners use border-radius (radius token 24px here for the soft block, 999px for the pill). Outlook squares them; that is the accepted fallback (same as condition-pills / ingredient-spotlight-card — no VML).
  - No CTA pill in this fragment, so no VML/MSO roundrect required. mso-line-height-rule:exactly is kept on spacer rows for Outlook.
-->
